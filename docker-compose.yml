services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./mangaApp-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./mangaApp-backend/.env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5001/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
