name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mobile-ci:
    name: Mobile app checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mangaApp
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mangaApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  backend-ci:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mangaApp-backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mangaApp-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: find . -path ./node_modules -prune -o -name '*.js' -type f -exec node --check {} +

      - name: Validate production image
        working-directory: .
        run: docker build --file mangaApp-backend/Dockerfile mangaApp-backend

  deploy:
    name: Deploy backend to Oracle
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs:
      - mobile-ci
      - backend-ci
    runs-on: ubuntu-latest
    concurrency:
      group: mangafy-production
      cancel-in-progress: false
    env:
      DEPLOY_HOST: ${{ secrets.OCI_HOST }}
      DEPLOY_USER: ${{ secrets.OCI_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
      SSH_KNOWN_HOSTS: ${{ secrets.OCI_KNOWN_HOSTS }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure deployment SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/mangafy_deploy
          chmod 600 ~/.ssh/mangafy_deploy
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Package backend release
        run: |
          tar \
            --exclude='mangaApp-backend/.env' \
            --exclude='mangaApp-backend/node_modules' \
            -czf "/tmp/mangafy-${GITHUB_SHA}.tar.gz" \
            docker-compose.yml \
            mangaApp-backend \
            scripts

      - name: Upload release
        run: |
          scp \
            -i ~/.ssh/mangafy_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "/tmp/mangafy-${GITHUB_SHA}.tar.gz" \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/mangafy-${GITHUB_SHA}.tar.gz"

      - name: Deploy and verify
        run: |
          ssh \
            -i ~/.ssh/mangafy_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "bash -s -- '/tmp/mangafy-${GITHUB_SHA}.tar.gz' '${GITHUB_SHA}'" \
            < scripts/remote-deploy.sh

      - name: Verify public health endpoint
        run: curl --fail --show-error --silent --retry 5 --retry-delay 3 "http://${DEPLOY_HOST}:5001/health"
