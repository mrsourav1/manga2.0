name: Publish Android update

on:
  push:
    tags:
      - "android-v*"
  workflow_dispatch:
    inputs:
      version:
        description: User-facing version, for example 1.1.0
        required: true
        type: string
      version_code:
        description: Increasing Android build number, for example 2
        required: true
        type: string
      minimum_supported_version_code:
        default: "1"
        description: Builds below this number must update
        required: true
        type: string
      release_notes:
        description: One release note per line
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Build and publish signed APK
    runs-on: ubuntu-latest
    concurrency:
      group: mangafy-android-release
      cancel-in-progress: false
    env:
      MANUAL_VERSION: ${{ inputs.version }}
      MANUAL_VERSION_CODE: ${{ inputs.version_code }}
      MANUAL_MINIMUM_VERSION_CODE: ${{ inputs.minimum_supported_version_code }}
      MANUAL_RELEASE_NOTES: ${{ inputs.release_notes }}
      EXPO_PUBLIC_BACKEND_URL: ${{ format('http://{0}:5001', secrets.OCI_HOST) }}
      EXPO_PUBLIC_MANGA_URL: ${{ secrets.APP_MANGA_URL }}
      AD_UNIT_BANNER: ${{ secrets.APP_AD_UNIT_BANNER }}
      AD_UNIT_OPEN: ${{ secrets.APP_AD_UNIT_OPEN }}
      MANGAFY_RELEASE_STORE_FILE: ${{ github.workspace }}/mangaApp/android/app/mangafy-release.keystore
      MANGAFY_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      MANGAFY_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      MANGAFY_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      DEPLOY_HOST: ${{ secrets.OCI_HOST }}
      DEPLOY_USER: ${{ secrets.OCI_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
      SSH_KNOWN_HOSTS: ${{ secrets.OCI_KNOWN_HOSTS }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare release information
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="$MANUAL_VERSION"
            VERSION_CODE="$MANUAL_VERSION_CODE"
            MINIMUM_VERSION_CODE="$MANUAL_MINIMUM_VERSION_CODE"
            RELEASE_NOTES="$MANUAL_RELEASE_NOTES"
          else
            VERSION="${GITHUB_REF_NAME#android-v}"

            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Release tags must use android-vMAJOR.MINOR.PATCH." >&2
              exit 1
            fi

            IFS=. read -r MAJOR MINOR PATCH <<< "$VERSION"
            VERSION_CODE=$((10#$MAJOR * 1000000 + 10#$MINOR * 1000 + 10#$PATCH))
            MINIMUM_VERSION_CODE="$VERSION_CODE"
            RELEASE_NOTES="MangaFy ${VERSION}"
          fi

          {
            echo "VERSION=$VERSION"
            echo "VERSION_CODE=$VERSION_CODE"
            echo "MINIMUM_VERSION_CODE=$MINIMUM_VERSION_CODE"
            echo "RELEASE_NOTES<<MANGAFY_RELEASE_NOTES"
            printf '%s\n' "$RELEASE_NOTES"
            echo "MANGAFY_RELEASE_NOTES"
          } >> "$GITHUB_ENV"

      - name: Validate release inputs
        run: |
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$VERSION_CODE" =~ ^[1-9][0-9]*$ ]]
          [[ "$MINIMUM_VERSION_CODE" =~ ^[1-9][0-9]*$ ]]

          if (( MINIMUM_VERSION_CODE > VERSION_CODE )); then
            echo "The minimum supported build cannot exceed the new build number." >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mangaApp/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install app dependencies
        working-directory: mangaApp
        run: npm ci

      - name: Restore release signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" \
            | base64 --decode \
            > "$MANGAFY_RELEASE_STORE_FILE"
          chmod 600 "$MANGAFY_RELEASE_STORE_FILE"

      - name: Build signed release APK
        working-directory: mangaApp/android
        run: |
          ./gradlew assembleRelease \
            -PMANGAFY_VERSION_NAME="$VERSION" \
            -PMANGAFY_VERSION_CODE="$VERSION_CODE"
          cp app/build/outputs/apk/release/app-release.apk ../mangafy.apk

      - name: Verify APK signature
        run: |
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)"
          "$APKSIGNER" verify --verbose --print-certs mangaApp/mangafy.apk

      - name: Publish GitHub release
        run: |
          TAG="android-v${VERSION}"
          NOTES="${RELEASE_NOTES:-MangaFy ${VERSION}}"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload \
              "$TAG" \
              "mangaApp/mangafy.apk#MangaFy Android APK" \
              --clobber \
              --repo "$GITHUB_REPOSITORY"
            gh release edit \
              "$TAG" \
              --latest \
              --notes "$NOTES" \
              --title "MangaFy ${VERSION}" \
              --repo "$GITHUB_REPOSITORY"
          else
            gh release create \
              "$TAG" \
              "mangaApp/mangafy.apk#MangaFy Android APK" \
              --latest \
              --notes "$NOTES" \
              --title "MangaFy ${VERSION}" \
              --repo "$GITHUB_REPOSITORY"
          fi

      - name: Configure deployment SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/mangafy_deploy
          chmod 600 ~/.ssh/mangafy_deploy
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Publish update information
        run: |
          TAG="android-v${VERSION}"
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/mangafy.apk"
          PUBLISHED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          jq -n \
            --arg version "$VERSION" \
            --argjson latestBuildNumber "$VERSION_CODE" \
            --argjson minimumSupportedBuildNumber "$MINIMUM_VERSION_CODE" \
            --arg downloadUrl "$DOWNLOAD_URL" \
            --arg notes "$RELEASE_NOTES" \
            --arg publishedAt "$PUBLISHED_AT" \
            '{
              enabled: true,
              latestVersion: $version,
              latestBuildNumber: $latestBuildNumber,
              minimumSupportedBuildNumber: $minimumSupportedBuildNumber,
              downloadUrl: $downloadUrl,
              releaseNotes: (
                $notes
                | split("\n")
                | map(gsub("^\\s+|\\s+$"; ""))
                | map(select(length > 0))
              ),
              publishedAt: $publishedAt
            }' > /tmp/app-update.json

          scp \
            -i ~/.ssh/mangafy_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            /tmp/app-update.json \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/app-update.json"

          ssh \
            -i ~/.ssh/mangafy_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "install -m 644 /tmp/app-update.json /home/ubuntu/manga/mangaApp-backend/config/app-update.json && rm -f /tmp/app-update.json"

      - name: Verify published update
        run: |
          curl \
            --fail \
            --show-error \
            --silent \
            --retry 5 \
            --retry-delay 3 \
            "http://${DEPLOY_HOST}:5001/api/app-update" \
            | jq -e \
              --arg version "$VERSION" \
              --argjson build "$VERSION_CODE" \
              '.enabled and .latestVersion == $version and .latestBuildNumber == $build'
